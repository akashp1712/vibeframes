<!--
  A minimal HyperFrames composition.
  Three timed clips on separate tracks:
    Track 0 — background gradient (DOM element)
    Track 1 — title text with fade-in animation
    Track 2 — subtitle with staggered entrance

  Total duration: 6 seconds.
  No external media files — pure HTML + CSS + GSAP.
-->
<div id="root" data-composition-id="hello-vibeframes"
     data-start="0" data-width="1920" data-height="1080">

  <!-- Track 0: Full-screen gradient background -->
  <div id="bg" class="clip"
       data-start="0" data-duration="6" data-track-index="0"
       style="
         position: absolute; inset: 0;
         background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
       "></div>

  <!-- Track 1: Title -->
  <h1 id="title" class="clip"
      data-start="0.5" data-duration="5" data-track-index="1"
      style="
        position: absolute;
        top: 38%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 96px;
        font-weight: 200;
        color: #e2e8f0;
        letter-spacing: 0.04em;
        text-align: center;
        white-space: nowrap;
      ">
    Hello, HyperFrames
  </h1>

  <!-- Track 2: Subtitle -->
  <p id="subtitle" class="clip"
     data-start="1.5" data-duration="4" data-track-index="2"
     style="
       position: absolute;
       top: 55%;
       left: 50%;
       transform: translate(-50%, -50%);
       font-family: system-ui, -apple-system, sans-serif;
       font-size: 32px;
       font-weight: 300;
       color: #94a3b8;
       letter-spacing: 0.06em;
       text-align: center;
     ">
    HTML in. Video out.
  </p>

  <!-- GSAP for animation -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>

  <script>
    const tl = gsap.timeline({ paused: true });

    // Title fades in and slides up
    tl.from("#title", {
      opacity: 0,
      y: 40,
      duration: 1.2,
      ease: "power2.out"
    }, 0.5);

    // Subtitle fades in after title
    tl.from("#subtitle", {
      opacity: 0,
      y: 20,
      duration: 0.8,
      ease: "power2.out"
    }, 1.5);

    // Subtle background shift
    tl.to("#bg", {
      background: "linear-gradient(135deg, #0f3460 0%, #1a1a2e 50%, #16213e 100%)",
      duration: 4,
      ease: "none"
    }, 1);

    window.__timelines = window.__timelines || {};
    window.__timelines["hello-vibeframes"] = tl;
  </script>
</div>
