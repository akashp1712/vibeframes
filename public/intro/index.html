<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeFrames Intro Video Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Geist", system-ui, sans-serif;
        background: #fbfaf7;
        color: #1c1917;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 2rem;
        padding: 3rem 1.5rem;
      }

      .header {
        text-align: center;
        max-width: 600px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
        padding: 0.25rem 0.75rem;
        background: rgba(79, 70, 229, 0.08);
        color: #4f46e5;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 500;
        margin-bottom: 1rem;
        border: 1px solid rgba(79, 70, 229, 0.12);
      }

      h1 {
        font-size: 2.25rem;
        font-weight: 500;
        letter-spacing: -0.025em;
        margin-bottom: 0.5rem;
      }

      p {
        font-size: 0.9375rem;
        color: #78716c;
        line-height: 1.5;
      }

      .player-container {
        width: 100%;
        max-width: 1000px;
        aspect-ratio: 16 / 9;
        background: #ffffff;
        border: 1px solid #e7e5e4;
        border-radius: 16px;
        box-shadow:
          0 10px 30px -10px rgba(0, 0, 0, 0.05),
          0 1px 3px rgba(0, 0, 0, 0.02);
        overflow: hidden;
        display: flex;
      }

      hyperframes-player {
        width: 100%;
        height: 100%;
        background: #fbfaf7;
      }

      .footer-note {
        font-size: 0.8125rem;
        color: #a8a29e;
        text-align: center;
      }

      .footer-note code {
        background: #e7e5e4;
        color: #44403c;
        padding: 0.125rem 0.375rem;
        border-radius: 4px;
        font-family: inherit;
        font-size: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="badge">
        <svg
          width="12"
          height="12"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-sparkles"
        >
          <path
            d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"
          />
          <path d="M20 3v4" />
          <path d="M22 5h-4" />
          <path d="M4 17v2" />
          <path d="M5 18H3" />
        </svg>
        website-to-hyperframes
      </div>
      <h1>VibeFrames Intro Video</h1>
      <p>
        A beautifully styled 30-second promotional intro showcasing the features and stack of
        VibeFrames—composed entirely of HTML, CSS, and GSAP timelines.
      </p>
    </div>

    <div class="player-container">
      <hyperframes-player
        src="./composition.html"
        controls
        autoplay
        loop
      ></hyperframes-player>
    </div>

    <div class="footer-note">
      Powered by the <code>&lt;hyperframes-player&gt;</code> HTML5 video generation runtime.
    </div>

    <script type="module" src="https://cdn.jsdelivr.net/npm/@hyperframes/player"></script>
  </body>
</html>
